# ============================================================
# docker-compose.dev.yml
# Solo levanta PostgreSQL y Redis para desarrollo local.
# El servidor Node y el cliente Vite corren sin Docker.
#
# Uso: docker compose -f docker-compose.dev.yml up -d
# ============================================================

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ntrl_postgres_dev
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - ./seeds/001_catalog_data.sql:/docker-entrypoint-initdb.d/002_catalog_data.sql:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ntrl_redis_dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
