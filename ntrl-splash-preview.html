<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NTRL - Bienvenido</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #09090b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }

  .dots {
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #27272a 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.35; pointer-events: none;
  }

  .glow {
    position: fixed;
    width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, #98f90912, transparent 65%);
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulseGlow 4s ease-in-out infinite;
  }

  .splash {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
    position: relative; z-index: 1;
    gap: 0;
  }

  /* Logo image with clip-path reveal */
  .logo-wrap {
    opacity: 0;
    animation: fadeIn 0.3s ease forwards 0.1s;
    margin-bottom: 2rem;
    position: relative;
  }

  .logo-img {
    width: 160px; height: 160px;
    object-fit: contain;
    clip-path: inset(100% 0 0 0);
    animation: revealDown 0.8s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
    filter: drop-shadow(0 0 24px #98f90960);
  }

  /* green ring that draws around the logo */
  .logo-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #98f909;
    border-right-color: #98f909;
    animation: ringDraw 1s ease forwards 1s;
    opacity: 0;
  }

  /* NTRL letters appear one by one */
  .brand-name {
    display: flex; align-items: baseline; gap: 2px;
    overflow: hidden; margin-bottom: 0.3rem;
  }

  .char {
    font-size: 3.8rem; font-weight: 900;
    color: #ffffff; letter-spacing: -1px;
    display: inline-block;
    opacity: 0; transform: translateY(50px);
    line-height: 1;
  }
  .char.green { color: #98f909; text-shadow: 0 0 20px #98f90970; }

  .char:nth-child(1) { animation: charUp 0.45s cubic-bezier(0.34,1.4,0.64,1) forwards 1.3s; }
  .char:nth-child(2) { animation: charUp 0.45s cubic-bezier(0.34,1.4,0.64,1) forwards 1.45s; }
  .char:nth-child(3) { animation: charUp 0.45s cubic-bezier(0.34,1.4,0.64,1) forwards 1.6s; }
  .char:nth-child(4) { animation: charUp 0.45s cubic-bezier(0.34,1.4,0.64,1) forwards 1.75s; }

  .brand-sub {
    font-size: 0.7rem; color: #3f3f46;
    letter-spacing: 0.28em; text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 2.1s;
    margin-bottom: 2.2rem;
  }

  /* scan line */
  .scan {
    width: 220px; height: 1px;
    background: linear-gradient(to right, transparent, #98f909, transparent);
    box-shadow: 0 0 8px #98f909;
    opacity: 0; margin-bottom: 2.2rem;
    animation: scanAnim 0.7s ease forwards 2.3s;
  }

  /* motivational message */
  .msg-wrap {
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 2.8s;
    margin-bottom: 2.2rem;
  }
  .msg {
    font-size: 0.9rem; color: #71717a;
    max-width: 290px; line-height: 1.65;
    position: relative; padding: 0 1.2rem;
  }
  .msg::before { content: '"'; color: #98f909; position: absolute; left: 0; top: -4px; font-size: 1.4rem; }
  .msg::after  { content: '"'; color: #98f909; position: absolute; right: 0; bottom: -8px; font-size: 1.4rem; }

  /* progress */
  .progress-wrap {
    width: 180px; opacity: 0;
    animation: fadeIn 0.5s ease forwards 3.2s;
  }
  .progress-label {
    font-size: 0.62rem; color: #3f3f46;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .progress-bar { height: 2px; background: #18181b; border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0%;
    background: #98f909; border-radius: 2px;
    box-shadow: 0 0 6px #98f909;
    animation: fillBar 2.8s cubic-bezier(0.4,0,0.2,1) forwards 3.4s;
  }

  .replay {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #18181b; border: 1px solid #27272a; color: #52525b;
    padding: 0.45rem 1.1rem; border-radius: 8px; font-size: 0.75rem;
    cursor: pointer; transition: color 0.2s, border-color 0.2s; z-index: 10;
  }
  .replay:hover { color: #fff; border-color: #98f909; }

  @keyframes pulseGlow {
    0%,100% { opacity:0.5; transform:translate(-50%,-50%) scale(1); }
    50%      { opacity:1;   transform:translate(-50%,-50%) scale(1.1); }
  }
  @keyframes fadeIn   { to { opacity: 1; } }
  @keyframes revealDown {
    to { clip-path: inset(0% 0 0 0); }
  }
  @keyframes ringDraw {
    0%   { opacity:1; transform: rotate(0deg) scale(0.8); }
    100% { opacity:0; transform: rotate(360deg) scale(1.2); }
  }
  @keyframes charUp {
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes scanAnim {
    0%   { opacity:0; transform:scaleX(0); }
    60%  { opacity:1; transform:scaleX(1); }
    100% { opacity:0.25; transform:scaleX(1); }
  }
  @keyframes fillBar { to { width: 100%; } }
  @keyframes msgIn {
    0%   { opacity:0; transform:translateY(8px); }
    15%  { opacity:1; transform:translateY(0); }
    85%  { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-8px); }
  }
</style>
</head>

<script>
  const messages = [
    "El éxito es el resultado del trabajo en equipo.",
    "Hoy es un gran día para crecer y superar metas.",
    "La disciplina es el puente entre las metas y los logros.",
    "Cada pedido es una oportunidad de marcar la diferencia.",
    "Trabaja con pasión, entrega con excelencia.",
  ];
  const el = document.getElementById('msg');
  let i = Math.floor(Math.random() * messages.length);
  function show() {
    el.textContent = messages[i];
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'msgIn 4.2s ease forwards';
    i = (i + 1) % messages.length;
  }
  setTimeout(() => { show(); setInterval(show, 4400); }, 2900);
</script>
